<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>今心网络 · 账号展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e5e5e5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:rgba(13,13,13,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);padding:12px 16px;border-bottom:1px solid #ffffff12}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-badge{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:8px;letter-spacing:1px;box-shadow:0 0 12px #6366f133;flex-shrink:0}
.title{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.sub{font-size:11px;color:#6b7280;margin-top:2px}
.container{max-width:720px;margin:0 auto;padding:8px 12px 24px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px}
.empty .icon{font-size:56px;margin-bottom:16px}
.empty h3{font-size:16px;color:#6b7280;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px;color:#6b7280}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px}
.spinner{width:36px;height:36px;border:3px solid #ffffff12;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:#6b7280}
.card{background:rgba(255,255,255,0.05);border:1px solid #ffffff12;border-radius:20px;overflow:hidden;margin-bottom:10px;box-shadow:0 4px 20px #00000044}
.card .img-box{height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#111}
.card .img-box img{width:100%;height:100%;object-fit:contain}
.card .img-box .game-tag{position:absolute;top:8px;left:8px;background:#00000066;backdrop-filter:blur(10px);color:#fff;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;z-index:2}
.card .body{padding:14px 16px 16px}
.card .row1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.card .name{font-size:15px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.st-idle{background:#22c55e}.st-rented{background:#f59e0b}.st-expired{background:#ef4444}.st-disabled{background:#6b7280}
.card .row2{font-size:12px;color:#9ca3af;margin-bottom:6px}
.card .prices{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.card .price-tag{background:#1a1a1a;border:1px solid #6366f133;border-radius:12px;padding:6px 14px;font-size:13px;color:#6366f1}
.card .price-tag .num{font-weight:900;font-size:18px}
.card .countdown{font-size:12px;color:#f59e0b;font-weight:700;padding:6px 10px;background:#221a00;border-radius:10px;margin-bottom:6px}
.card .highlight{font-size:11px;color:#f59e0b;line-height:1.5;padding:8px 10px;background:#221a00;border-radius:10px;word-break:break-all}
.stats-bar{display:flex;gap:6px;margin-bottom:14px;padding:2px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stats-bar .chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.06);color:#8e8e93;transition:all .15s;white-space:nowrap;border:1px solid #ffffff12}
.stats-bar .chip.active{background:#6366f1;color:#fff;border-color:transparent;box-shadow:0 4px 14px #6366f133}
.lightbox{position:fixed;inset:0;z-index:999;background:#000000ee;display:none;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
.lightbox .close{position:absolute;top:16px;right:20px;color:#fff;font-size:30px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#ffffff22;border-radius:50%;backdrop-filter:blur(10px)}
.lightbox .close:hover{background:#ffffff44}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="topbar"><div class="logo-row"><span class="logo-badge">今心网络</span><span class="title">账号展示</span></div><div class="sub" id="info">加载中...</div></div>
<div class="container" id="main"></div>
<div class="lightbox" id="lightbox" onclick="hideLightbox()"><span class="close">✕</span><img id="lightboxImg" src="" alt="装备图"></div>
<script>
const GAME_EMOJI={LOL:'🎮',DNF:'⚔️',CF:'🔫',永劫无间:'🗡️',原神:'✨',王者荣耀:'👑',和平精英:'',绝地求生:'',逆战:'💥',魔兽世界:'🐉',梦幻西游:'🐵',传奇:'⚡'};
const GAME_IMG={LOL:'LOL.png',CF:'CF.png',DNF:'DNF.png',永劫无间:'yjwj.png',吃鸡:'heji.png',和平精英:'heji.png',绝地求生:'heji.png',王者荣耀:'wzry.png',原神:'ys.png',魔兽世界:'mssj.png',逆战:'nz.png',梦幻西游:'mhxy.png',传奇:'cq.png'};
const SC={空闲:'st-idle',已出租:'st-rented',已到期:'st-expired',停用:'st-disabled'};
let allAccounts=[],activeFilter='全部';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').style.display='flex';document.body.style.overflow='hidden'}
function hideLightbox(){document.getElementById('lightbox').style.display='none';document.body.style.overflow=''}
function chip(label,count,filter){const cls=activeFilter===filter?'active':'';return '<span class="chip '+cls+'" onclick="setFilter(\''+filter+'\')">'+label+' '+count+'</span>'}
function setFilter(f){activeFilter=f;render()}

function getStatus(a){
  if(a.status==='停用')return'停用';
  if(a.status==='空闲')return'空闲';
  if(a.re&&new Date(a.re)<=new Date())return'已到期';
  return a.status;
}
function getRemain(a){
  if(getStatus(a)!=='已出租'||!a.re)return'';
  let d=new Date(a.re)-new Date();
  if(d<=0)return'';
  let dd=Math.floor(d/86400000),hh=Math.floor(d%86400000/3600000);
  return '⏱ '+(dd>0?dd+'天 ':'')+hh+'小时';
}
function formatPrices(prices){
  if(!prices||!prices.length)return'';
  return prices.map(p=>'<span class="price-tag">¥<span class="num">'+p.price+'</span> / '+p.dur+p.unit+'</span>').join('');
}
function renderCard(a){
  const g=a.game||'',imgFile=GAME_IMG[g],emoji=GAME_EMOJI[g]||'🎮';
  let imgHtml='';
  if(a.equip)imgHtml='<img src="'+esc(a.equip)+'" onclick="showLightbox(this.src)" style="cursor:zoom-in" onerror="this.style.display=\'none\'">';
  else if(imgFile)imgHtml='<img src="'+imgFile+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span class="emoji-fallback" style="display:none">'+emoji+'</span>';
  else imgHtml='<span class="emoji-fallback">'+emoji+'</span>';
  const s=getStatus(a),pricesHtml=formatPrices(a.prices),remain=getRemain(a);
  return '<div class="card"><div class="img-box">'+(g?'<span class="game-tag">'+esc(g)+'</span>':'')+imgHtml+'</div><div class="body"><div class="row1"><span class="name">'+esc(a.name)+'</span><span class="status '+(SC[s]||'st-idle')+'">'+s+'</span></div><div class="row2"><span>'+esc(a.code)+'</span><span> · </span><span>'+esc(a.region)+(a.level?'<span style="color:#f59e0b"> · '+esc(a.level)+'</span>':'')+'</span></div>'+(pricesHtml?'<div class="prices">'+pricesHtml+'</div>':'')+(remain?'<div class="countdown">'+remain+'</div>':'')+'<div class="highlight">'+esc(a.highlight||'暂无亮点')+'</div></div></div>';
}
function render(){
  const main=document.getElementById('main'),info=document.getElementById('info');
  let list=allAccounts;
  if(activeFilter!=='全部')list=list.filter(a=>getStatus(a)===activeFilter);
  const counts={全部:allAccounts.length,空闲:0,已出租:0,已到期:0};
  allAccounts.forEach(a=>{let s=getStatus(a);if(counts[s]!==undefined)counts[s]++});
  const stats='<div class="stats-bar">'+['全部','空闲','已出租','已到期'].map(s=>chip(s,counts[s],s)).join('')+'</div>';
  info.textContent='共 '+allAccounts.length+' 个号 · 实时更新';
  main.innerHTML=stats+(list.length?list.map(renderCard).join(''):'<div class="empty"><div class="icon">📭</div><h3>暂无符合条件的账号</h3></div>');
}

async function loadFromGit(){
  try{
    let r=await fetch('https://raw.githubusercontent.com/56gfy/jxwl/main/data.json');
    if(!r.ok)return null;
    let data=await r.json();
    return data&&data.accounts?data.accounts:null;
  }catch(e){return null}
}

async function main(){
  const main=document.getElementById('main'),info=document.getElementById('info');
  const p=new URLSearchParams(location.search);
  const key=p.get('k')||location.hash.slice(1)||'';

  if(!key){
    // Real-time mode
    main.innerHTML='<div class="loading"><div class="spinner"></div><p>正在获取最新数据...</p></div>';
    let accounts=await loadFromGit();
    if(accounts&&accounts.length>0){
      allAccounts=accounts;render();
      setInterval(async()=>{let acc=await loadFromGit();if(acc){allAccounts=acc;render()}},5000);
      setInterval(render,1000);
    }else{
      main.innerHTML='<div class="empty"><div class="icon">📭</div><h3>暂无账号</h3><p>请稍后再来看看</p></div>';
      info.textContent='暂无数据';
    }
  }else{
    // Legacy encrypted link mode (backward compatible)
    main.innerHTML='<div class="loading"><div class="spinner"></div><p>解密中...</p></div>';
    info.textContent='加载中...';
    try{
      if(!key.startsWith('JX1:'))throw new Error('格式错误');
      const payload=key.slice(4),i=payload.lastIndexOf('!');
      if(i===-1)throw new Error('缺少校验码');
      const b64=payload.slice(0,i),cs=payload.slice(i+1);
      const h=new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(b64)));
      const hash=Array.from(h).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,8);
      if(hash!==cs)throw new Error('校验失败');
      function b64ToBytes(b64){b64=b64.replace(/-/g,'+').replace(/_/g,'/');while(b64.length%4)b64+='=';return Uint8Array.from(atob(b64),c=>c.charCodeAt(0))}
      const d=new DecompressionStream('gzip'),w=d.writable.getWriter();
      w.write(b64ToBytes(b64));w.close();
      const b=await new Response(d.readable).arrayBuffer();
      allAccounts=JSON.parse(new TextDecoder().decode(b));
      if(!allAccounts.length){main.innerHTML='<div class="empty"><div class="icon">📭</div><h3>没有账号</h3></div>';return}
      render();info.textContent='共 '+allAccounts.length+' 个号';
    }catch(e){main.innerHTML='<div class="empty"><div class="icon">🔑</div><h3>密钥无效</h3></div>';info.textContent='加载失败'}
  }
}
main();
</script>
</body>
</html>
