<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>账号展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060910;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0b1220ee 0%,#0b1220aa 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px;border-bottom:0.5px solid #1e293b}
.topbar .title{font-size:18px;font-weight:900;color:#f1f5f9;letter-spacing:.5px}
.topbar .sub{font-size:11px;color:#64748b;margin-top:2px}
.container{max-width:720px;margin:0 auto;padding:8px 12px 24px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px}
.empty .icon{font-size:56px;margin-bottom:16px}
.empty h3{font-size:16px;color:#94a3b8;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px;color:#475569}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px}
.spinner{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:#64748b}
.error{background:linear-gradient(135deg,#3f1d1d,#2d1010);color:#fca5a5;border:1px solid #7f1d1d;border-radius:16px;padding:14px 18px;margin:8px 0;font-size:13px;line-height:1.5}
.card{background:linear-gradient(145deg,#0f172a,#111a31);border:1px solid #1a2438;border-radius:20px;overflow:hidden;margin-bottom:10px;transition:transform .15s,border .2s,box-shadow .2s}
.card:active{transform:scale(.98);border-color:#3b82f6;box-shadow:0 0 20px #3b82f611}
.card .img-box{height:170px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a101f}
.card .img-box img{width:100%;height:100%;object-fit:cover}
.card .img-box::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,#0f172a 100%),linear-gradient(0deg,transparent 70%,#0f172a44 100%),linear-gradient(90deg,#0f172a44 0%,transparent 15%,transparent 85%,#0f172a44 100%);z-index:1;pointer-events:none}
.card .img-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(0deg,#0f172a,transparent);z-index:1}
.card .img-box .game-tag{position:absolute;top:10px;left:10px;background:#00000055;backdrop-filter:blur(8px);color:#cbd5e1;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;z-index:2}
.card .img-box .emoji-fallback{font-size:48px;z-index:1;position:relative}
.card .body{padding:14px 16px 16px}
.card .row1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.card .name{font-size:15px;font-weight:800;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;letter-spacing:.2px;flex-shrink:0}
.st-idle{background:#166534;color:#86efac}
.st-rented{background:#78350f;color:#fde68a}
.st-expired{background:#991b1b;color:#fecaca}
.st-disabled{background:#374151;color:#9ca3af}
.card .row2{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.card .code{font-size:12px;color:#64748b}
.card .dot{color:#334155}
.card .region{font-size:12px;color:#64748b}
.card .price-row{display:flex;align-items:baseline;gap:4px;margin-bottom:8px;padding:10px 14px;background:#0b1220;border-radius:14px}
.card .currency{font-size:14px;color:#60a5fa;font-weight:700}
.card .price{font-size:22px;font-weight:900;color:#60a5fa;letter-spacing:.5px}
.card .unit{font-size:12px;color:#475569;margin-left:2px}
.card .highlight{font-size:11px;color:#475569;line-height:1.5;padding:8px 10px;background:#0a0f1a;border-radius:10px;word-break:break-all}
.stats-bar{display:flex;gap:6px;margin-bottom:14px;padding:2px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stats-bar .chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #1e293b;background:#0f172a;color:#94a3b8;transition:all .15s;white-space:nowrap}
.stats-bar .chip.active{background:#1d4ed8;color:#fff;border-color:#3b82f6}
</style>
</head>
<body>
<div class="topbar"><div class="title">账号展示</div><div class="sub" id="info">加载中...</div></div>
<div class="container" id="main"></div>
<script>
const GAME_EMOJI={LOL:'🎮',DNF:'⚔️',CF:'🔫',永劫无间:'🗡️',原神:'✨',王者荣耀:'👑',和平精英:'',绝地求生:'',逆战:'💥',魔兽世界:'🐉',梦幻西游:'🐵',传奇:'⚡'};
const GAME_IMG={LOL:'LOL.png',CF:'CF.png',DNF:'DNF.png',永劫无间:'yjwj.png',吃鸡:'heji.png',和平精英:'heji.png',绝地求生:'heji.png',王者荣耀:'wzry.png',原神:'ys.png',魔兽世界:'mssj.png',逆战:'nz.png',梦幻西游:'mhxy.png',传奇:'cq.png'};
const SC={空闲:'st-idle',已出租:'st-rented',已到期:'st-expired',停用:'st-disabled'};
let allAccounts=[],activeFilter='全部';

function b64ToBytes(b64){b64=b64.replace(/-/g,'+').replace(/_/g,'/');while(b64.length%4)b64+='=';return Uint8Array.from(atob(b64),c=>c.charCodeAt(0))}
async function decompress(c){const d=new DecompressionStream('gzip'),w=d.writable.getWriter();w.write(c);w.close();const b=await new Response(d.readable).arrayBuffer();return new TextDecoder().decode(b)}
function fromURL(){const p=new URLSearchParams(location.search);return p.get('k')||''}

async function loadKey(key){
  if(!key.startsWith('JX1:'))throw new Error('密钥格式错误');
  const payload=key.slice(4),i=payload.lastIndexOf('!');
  if(i===-1)throw new Error('缺少校验码，用 ! 分隔');
  const b64=payload.slice(0,i),cs=payload.slice(i+1);
  const h=new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(b64)));
  const hash=Array.from(h).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,8);
  if(hash!==cs)throw new Error('密钥校验失败');
  return JSON.parse(await decompress(b64ToBytes(b64)));
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function chip(label,count,filter){const cls=activeFilter===filter?'active':'';return '<span class="chip '+cls+'" onclick="setFilter(\''+filter+'\')">'+label+' '+count+'</span>'}
function setFilter(f){activeFilter=f;render()}
function renderCard(a){
  const g=a.game||'',imgFile=GAME_IMG[g],emoji=GAME_EMOJI[g]||GAME_EMOJI[g]===''?'':'🎮';
  let imgHtml;
  if(imgFile){
    imgHtml='<img src="'+imgFile+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span class="emoji-fallback" style="display:none">'+emoji+'</span>';
  } else {
    imgHtml='<span class="emoji-fallback">'+emoji+'</span>';
  }
  const p=typeof a.price==='number'?a.price.toFixed(0):'0';
  return '<div class="card"><div class="img-box">'+(g?'<span class="game-tag">'+esc(g)+'</span>':'')+imgHtml+'</div><div class="body"><div class="row1"><span class="name">'+esc(a.name)+'</span><span class="status '+(SC[a.status]||'st-idle')+'">'+esc(a.status||'空闲')+'</span></div><div class="row2"><span class="code">'+esc(a.code)+'</span><span class="dot">·</span><span class="region">'+esc(a.region)+'</span></div><div class="price-row"><span class="currency">¥</span><span class="price">'+p+'</span><span class="unit">/ 天</span></div><div class="highlight">'+esc(a.highlight||'暂无亮点')+'</div></div></div>';
}
function render(){
  const main=document.getElementById('main'),info=document.getElementById('info');
  let list=allAccounts;
  if(activeFilter!=='全部')list=list.filter(a=>a.status===activeFilter);
  const counts={全部:allAccounts.length,空闲:0,已出租:0,已到期:0};
  allAccounts.forEach(a=>{if(counts[a.status]!==undefined)counts[a.status]++});
  const stats='<div class="stats-bar">'+['全部','空闲','已出租','已到期'].map(s=>chip(s,counts[s],s)).join('')+'</div>';
  info.textContent='共 '+allAccounts.length+' 个号';
  main.innerHTML=stats+(list.length?list.map(renderCard).join(''):'<div class="empty"><div class="icon">📭</div><h3>暂无符合的账号</h3><p>试试切换上方筛选</p></div>');
}
async function main(){
  const main=document.getElementById('main'),info=document.getElementById('info'),key=fromURL();
  if(!key){info.textContent='无密钥';main.innerHTML='<div class="empty"><div class="icon">🔑</div><h3>请使用带链接访问</h3><p>链接示例：?k=JX1:...</p></div>';return}
  main.innerHTML='<div class="loading"><div class="spinner"></div><p>解密中...</p></div>';
  try{allAccounts=await loadKey(key);if(!allAccounts.length){main.innerHTML='<div class="empty"><div class="icon">📭</div><h3>没有号</h3></div>';return}render()}catch(e){main.innerHTML='<div class="error">'+esc(e.message)+'</div>';info.textContent='加载失败'}
}
main();
</script>
</body>
</html>
