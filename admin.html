<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>今心网络 · 管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e5e5e5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:rgba(13,13,13,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);padding:10px 14px;border-bottom:1px solid #ffffff12;display:flex;align-items:center;gap:8px}
.logo{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:8px;letter-spacing:1px;box-shadow:0 0 12px #6366f133;flex-shrink:0}
.title{font-size:16px;font-weight:700;color:#fff}
.container{max-width:720px;margin:0 auto;padding:8px 12px 80px}
.stats{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{padding:10px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.06);color:#8e8e93;text-align:center;flex:1;min-width:60px;transition:all .2s;border:1px solid #ffffff12}
.stat b{display:block;font-size:22px;margin-top:2px;color:#e5e5e5}
.stat.active{background:#6366f1;color:#fff;box-shadow:0 4px 14px #6366f133}
.stat.active b{color:#fff}
.toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:120px;background:#1a1a1a;color:#e5e5e5;border:1px solid #ffffff15;border-radius:16px;padding:10px 14px;font-size:13px;outline:none}
.toolbar input:focus{border-color:#6366f1;box-shadow:0 0 0 3px #6366f122}
.btn{padding:8px 16px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-blue{background:#6366f1;color:#fff}.btn-purple{background:#a855f7;color:#fff}.btn-teal{background:#14b8a6;color:#fff}.btn-dark{background:#1a1a1a;color:#e5e5e5;border:1px solid #ffffff12}.btn-red{background:#ef4444;color:#fff}.btn-orange{background:#f59e0b;color:#fff}
.card{background:rgba(255,255,255,0.05);border:1px solid #ffffff12;border-radius:20px;overflow:hidden;margin-bottom:10px;transition:all .2s;box-shadow:0 4px 20px #00000044}
.card:active{transform:scale(.98)}
.card .img-box{height:140px;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card .img-box img{width:100%;height:100%;object-fit:cover;object-position:35% center}
.card .img-box .emoji{font-size:44px;position:relative;z-index:1;filter:grayscale(.3)}
.card .img-box .game-tag{position:absolute;top:8px;left:8px;background:#00000066;backdrop-filter:blur(10px);color:#fff;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;z-index:2}
.card .body{padding:12px 14px 14px}
.card .row1{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.card .name{font-size:15px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .status{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.st-idle{background:#22c55e}.st-rented{background:#f59e0b}.st-expired{background:#ef4444}.st-disabled{background:#6b7280}
.card .row2{display:flex;gap:4px;font-size:11px;color:#9ca3af;margin-bottom:4px}
.card .price-row{display:flex;align-items:baseline;gap:4px;margin-bottom:5px;padding:8px 12px;background:#1a1a1a;border-radius:12px}
.card .price{font-size:18px;font-weight:900;color:#6366f1}
.card .unit{font-size:11px;color:#9ca3af}
.card .countdown{font-size:11px;color:#f59e0b;font-weight:700;padding:6px 10px;background:#221a00;border-radius:10px;margin-bottom:6px}
.card .highlight{font-size:10px;color:#f59e0b;line-height:1.4;margin-bottom:8px}
.card .actions{display:flex;gap:4px;flex-wrap:wrap}
.card .actions .btn{flex:1;min-width:52px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#1a1a1a;border-radius:24px 24px 0 0;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:20px 18px 30px;border-top:1px solid #ffffff12}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px;color:#fff}
.modal label{display:block;font-size:12px;color:#9ca3af;margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;background:#111;color:#e5e5e5;border:1px solid #ffffff12;border-radius:12px;padding:10px 12px;font-size:13px;outline:none;margin-bottom:4px;font-family:inherit}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#6366f1}
.modal textarea{height:56px;resize:vertical}
.modal select{appearance:none}
.modal .price-unit-row{display:flex;gap:8px;align-items:center}
.modal .price-unit-row input{flex:1}
.modal .price-unit-row select{width:90px;flex:none}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row .btn{flex:1;padding:12px;font-size:14px;border-radius:16px}
.history-table{width:100%;font-size:11px;border-collapse:collapse}
.history-table th{color:#9ca3af;text-align:left;padding:6px 8px;border-bottom:1px solid #ffffff12}
.history-table td{padding:8px;border-bottom:1px solid #ffffff08;color:#e5e5e5}
.empty-state{text-align:center;padding:60px 20px;color:#6b7280}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid #ffffff12;padding:8px 12px;display:flex;gap:6px;z-index:40}
.bottom-bar .btn{flex:1;padding:10px;font-size:11px}
</style>
</head>
<body>
<div class="topbar"><span class="logo">今心网络</span><span class="title">管理后台</span></div>
<div class="container" id="app"></div>
<div class="bottom-bar">
  <button class="btn btn-blue" onclick="showAdd()">＋新增</button>
  <button class="btn btn-purple" onclick="showShare()">上架</button>
  <button class="btn btn-dark" onclick="showHistory()">记录</button>
  <button class="btn btn-dark" onclick="doExport()">导出</button>
  <button class="btn btn-dark" onclick="doImport()">导入</button>
</div>
<script>
const GAME_IMG={LOL:'LOL.png?v=2',CF:'CF.png?v=2',DNF:'DNF.png?v=2',永劫无间:'yjwj.png?v=2',和平精英:'heji.png?v=2',吃鸡:'heji.png?v=2',王者荣耀:'wzry.png?v=2',原神:'ys.png?v=2',魔兽世界:'mssj.png?v=2',逆战:'nz.png?v=2',梦幻西游:'mhxy.png?v=2',传奇:'cq.png?v=2'};
const STY={空闲:'st-idle',已出租:'st-rented',已到期:'st-expired',停用:'st-disabled'};
const GAMES=['','LOL','CF','DNF','永劫无间','和平精英','王者荣耀','原神','魔兽世界','逆战','梦幻西游','传奇'];
const LEVELS={王者荣耀:['青铜','白银','黄金','铂金','钻石','星耀','王者','荣耀王者'],LOL:['黑铁','青铜','白银','黄金','铂金','钻石','超凡','王者'],和平精英:Array.from({length:100},(_,i)=>i+1+'级'),CF:['新锐','精英','专家','大师','枪王','枪王之王'],DNF:Array.from({length:100},(_,i)=>i+1+'级'),永劫无间:['青铜','白银','黄金','铂金','陨星','蚀月','修罗'],原神:Array.from({length:60},(_,i)=>i+1+'级'),魔兽世界:Array.from({length:80},(_,i)=>i+1+'级'),逆战:['青铜','白银','黄金','钻石','王者'],梦幻西游:Array.from({length:175},(_,i)=>i+1+'级'),传奇:Array.from({length:100},(_,i)=>i+1+'级')};
function updateLevels(sv){let sel=document.getElementById('f_level');if(!sel)return;let lv=LEVELS[document.getElementById('f_game').value]||[];sel.innerHTML='<option value=\"\">无</option>'+lv.map(l=>'<option'+(sv===l?' selected':'')+'>'+l+'</option>').join('');}
let accounts=[],filter='全部',search='',nextId=1,history=[];
const UNIT_OPTIONS=['小时','天'];
// Price unit selector no longer needed - unit chosen during rental

function save(){localStorage.setItem('jx_acc',JSON.stringify(accounts));localStorage.setItem('jx_nid',nextId)}
function load(){try{let a=localStorage.getItem('jx_acc');if(a){accounts=JSON.parse(a);accounts.forEach(x=>{if(x.id>=nextId)nextId=x.id+1})}}catch(e){}nextId=parseInt(localStorage.getItem('jx_nid')||'1')}
function saveHist(){localStorage.setItem('jx_hist',JSON.stringify(history.slice(0,200)))}
function loadHist(){try{let h=localStorage.getItem('jx_hist');if(h)history=JSON.parse(h)}catch(e){}}
function nowISO(){return new Date().toISOString().slice(0,16)}
function rs(a){if(a.status==='停用')return'停用';if(a.status==='空闲')return'空闲';if(a.re&&new Date(a.re)<=new Date())return'已到期';return a.status}
function rem(a){
  let s=rs(a);if(s!=='已出租')return'';
  if(!a.re)return'';let d=new Date(a.re)-new Date();if(d<=0)return'已到期';
  let dd=Math.floor(d/86400000),hh=Math.floor(d%86400000/3600000),mm=Math.floor(d%3600000/60000);
  let parts=[];if(dd>0)parts.push(dd+'天');if(hh>0)parts.push(hh+'小时');if(mm>0&&dd===0)parts.push(mm+'分');
  return '还剩 '+parts.join(' ');
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Key codec
async function gz(s){let c=new CompressionStream('gzip'),w=c.writable.getWriter();w.write(new TextEncoder().encode(s));w.close();return new Uint8Array(await new Response(c.readable).arrayBuffer())}
async function ugz(d){let s=new DecompressionStream('gzip'),w=s.writable.getWriter();w.write(d);w.close();return new TextDecoder().decode(await new Response(s.readable).arrayBuffer())}
function b64e(u){let s='';u.forEach(b=>s+=String.fromCharCode(b));return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function b64d(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function sha(s){let h=new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)));return Array.from(h).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function enc(list){let b=b64e(await gz(JSON.stringify(list)));return'JX1:'+b+'!'+(await sha(b)).slice(0,8)}
async function dec(k){k=k.trim();if(!k.startsWith('JX1:'))throw Error('格式错误');let p=k.slice(4),i=p.lastIndexOf('!');if(i===-1)throw Error('缺少校验码');let b=p.slice(0,i),c=p.slice(i+1);if((await sha(b)).slice(0,8)!==c)throw Error('校验失败');return JSON.parse(await ugz(b64d(b)))}

function renderStats(){
  let t=0,il=0,rt=0,ex=0;accounts.forEach(a=>{t++;let s=rs(a);if(s==='空闲')il++;if(s==='已出租')rt++;if(s==='已到期')ex++});
  return'<div class="stats">'+['全部','空闲','已出租','已到期'].map(s=>'<div class="stat'+(filter===s?' active':'')+'" onclick="filter=\''+s+'\';render()">'+s+'<b>'+{全部:t,空闲:il,已出租:rt,已到期:ex}[s]+'</b></div>').join('')+'</div>';
}
function card(a){
  let s=rs(a),g=a.game||'',im=GAME_IMG[g],ac=[];
  let ib='<div class="img-box">';
  if(im)ib+='<img src="'+im+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span class="emoji" style="display:none">🎮</span>';
  else ib+='<span class="emoji">🎮</span>';
  ib+='<div class="gradient" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,0.6) 0%,transparent 40%)"></div>'+(g?'<span class="game-tag">'+esc(g)+'</span>':'')+'</div>';
  let punit='';
  if(s==='空闲')ac.push('<button class="btn btn-teal" onclick="doRent('+a.id+')">出租</button>');
  if(s==='已出租'||s==='已到期')ac.push('<button class="btn btn-dark" onclick="doIdle('+a.id+')">归还</button>');
  ac.push('<button class="btn btn-dark" onclick="editAc('+a.id+')">编辑</button>');
  if(s==='停用')ac.push('<button class="btn btn-blue" onclick="doOn('+a.id+')">启用</button>');
  else ac.push('<button class="btn btn-dark" onclick="doOff('+a.id+')">停用</button>');
  ac.push('<button class="btn btn-red" onclick="doDel('+a.id+')">删</button>');
  return'<div class="card">'+ib+'<div class="body"><div class="row1"><span class="name">'+esc(a.name)+'</span><span class="status '+STY[s]+'">'+s+'</span></div><div class="row2"><span>'+esc(a.code)+'</span><span>·</span><span>'+esc(a.region)+'</span>'+(a.level?'<span style="color:#f59e0b"> · '+esc(a.level)+'</span>':'')+'</div><div class="price-row"><span>¥</span><span class="price">'+(a.price||0).toFixed(0)+'</span></div>'+(s==='已出租'?'<div class="countdown">'+rem(a)+'</div>':'')+'<div class="highlight">'+esc(a.highlight||'暂无亮点')+'</div><div class="actions">'+ac.join('')+'</div></div></div>';
}
function render(){
  let l=accounts;if(filter!=='全部')l=l.filter(a=>rs(a)===filter);
  if(search)l=l.filter(a=>(a.name+a.code+a.region).toLowerCase().includes(search.toLowerCase()));
  document.getElementById('app').innerHTML=renderStats()+'<div class="toolbar"><input placeholder="搜索账号" value="'+esc(search)+'" oninput="search=this.value;render()"></div>'+(l.length?l.map(card).join(''):'<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📭</div><p>暂无账号</p></div>');
}
function doDel(id){if(confirm('确定删除？')){accounts=accounts.filter(a=>a.id!==id);save();render()}}
function doOff(id){let a=accounts.find(a=>a.id===id);if(a){a.status='停用';save();render()}}
function doOn(id){let a=accounts.find(a=>a.id===id);if(a){a.status='空闲';a.rv=null;a.ru=null;a.rs=null;a.re=null;save();render()}}
function doIdle(id){let a=accounts.find(a=>a.id===id);if(a){addHist(a);a.status='空闲';a.rv=null;a.ru=null;a.rs=null;a.re=null;save();render()}}
function doRent(id){
  let a=accounts.find(a=>a.id===id);if(!a)return;
  let s=prompt('输入时长，如：15小时、2天、3天','1天');if(!s)return;
  let m=s.match(/^(\d+(?:\.\d+)?)\s*(小时|天)$/);
  if(!m){alert('格式错误，请用"数字+小时/天" 如：15小时、2天');return}
  let d=parseFloat(m[1]),unit=m[2];
  if(!d||d<1)return;
  a.status='已出租';
  if(unit==='小时'){a.rv=d;a.ru='小时';a.rs=nowISO();a.re=new Date(Date.now()+d*3600000).toISOString().slice(0,16)}
  else{a.rv=d;a.ru='天';a.rs=nowISO();a.re=new Date(Date.now()+d*86400000).toISOString().slice(0,16)}
  save();render()
}
function showModal(ac){
  let ed=!!ac,h='<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>'+(ed?'编辑':'新增')+'账号</h3>';
  let f=(l,n,v,t='input')=>t==='input'?'<label>'+l+'</label><input id="f_'+n+'" value="'+esc(v||'')+'">':'<label>'+l+'</label><'+t+' id="f_'+n+'">'+esc(v||'')+'</'+t+'>';
  h+=f('编号','code',ac?.code);h+=f('名称','name',ac?.name);h+=f('区服','region',ac?.region);
  h+=f('价格','price',ac?.price);
  h+=f('备注','hl',ac?.highlight,'textarea');
  h+='<label>游戏</label><select id="f_game" onchange="updateLevels()">'+GAMES.map(g=>'<option'+(ac?.game===g?' selected':'')+'>'+g+'</option>').join('')+'</select>';
  h+='<label>等级</label><select id="f_level"><option value="">无</option></select>';
  h+='<label>状态</label><select id="f_status"><option value="空闲"'+(ac?.status!=='停用'?' selected':'')+'>空闲</option><option value="停用"'+(ac?.status==='停用'?' selected':'')+'>停用</option></select>';
  h+='<div class="btn-row"><button class="btn btn-dark" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-blue" onclick="saveAc('+(ed?ac.id:'null')+')">保存</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  setTimeout(function(){let g=document.getElementById('f_game');if(g)updateLevels(ac?.level||'');},50);
}
function showAdd(){showModal(null)}
function editAc(id){var ac=accounts.find(a=>a.id==id);if(!ac){alert('账号未找到 ID:'+id);return};showModal(ac)}
function saveAc(id){
  let g=n=>document.getElementById('f_'+n).value.trim();
  let a={code:g('code'),name:g('name'),region:g('region'),price:parseFloat(g('price'))||0,highlight:g('hl'),game:document.getElementById('f_game').value,level:document.getElementById('f_level').value,status:document.getElementById('f_status').value};
  if(!a.code||!a.name||!a.region){alert('编号/名称/区服必填');return}
  if(id){let o=accounts.find(x=>x.id==id);Object.assign(o,a)}else{a.id=accounts.length?Math.max(...accounts.map(x=>x.id))+1:1;a.rv=null;a.ru=null;a.rs=null;a.re=null;accounts.unshift(a)}
  save();render();document.querySelector('.modal-overlay')?.remove()
}
async function showShare(){
  let av=accounts.filter(a=>{let s=rs(a);return s==='空闲'||s==='已出租'});
  if(!av.length){alert('没有可上架的号');return}
  let h='<div class="modal-overlay" id="shareModal" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>上架账号</h3>';
  h+='<div style="margin-bottom:10px;display:flex;gap:6px"><button class="btn btn-blue" onclick="document.querySelectorAll(\'.share-cb\').forEach(c=>c.checked=true)">全选</button><button class="btn btn-dark" onclick="document.querySelectorAll(\'.share-cb\').forEach(c=>c.checked=false)">取消</button></div>';
  av.forEach(a=>{let s=rs(a);h+='<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer"><input type="checkbox" class="share-cb" value="'+a.id+'" '+(s==='空闲'?'checked':'')+'><span style="flex:1;font-size:13px;color:#e5e5e5">'+esc(a.name)+' <span style="color:#9ca3af">'+esc(a.code)+' ¥'+(a.price||0).toFixed(0)+'</span></span><span class="status '+STY[s]+'" style="font-size:10px;padding:2px 8px">'+s+'</span></label>'});
  h+='<div class="btn-row"><button class="btn btn-dark" onclick="document.getElementById(\'shareModal\').remove()">取消</button><button class="btn btn-purple" onclick="doShare()">生成链接</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  window._shareAccounts=av;
}
async function doShare(){
  let ids=[...document.querySelectorAll('.share-cb:checked')].map(c=>parseInt(c.value));
  let sel=window._shareAccounts.filter(a=>ids.includes(a.id));
  if(!sel.length){alert('请至少选一个');return}
  let k=await enc(sel.map(a=>({code:a.code,name:a.name,region:a.region,price:a.price,highlight:a.highlight,game:a.game||'',status:rs(a),level:a.level||''})));
  let url=window.location.origin+'/jxwl/?k='+k;
  try{navigator.clipboard.writeText(url);alert('链接已复制！共'+sel.length+'个号')}catch(e){prompt('复制链接：',url)}
  document.getElementById('shareModal')?.remove()
}
function addHist(a){if(!a.rs)return;history.unshift({code:a.code,name:a.name,rv:a.rv,ru:a.ru,rs:a.rs,re:nowISO()});saveHist()}
function showHistory(){
  let h='<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>出租记录</h3>';
  if(!history.length)h+='<p style="color:#6b7280">暂无记录</p>';
  else h+='<table class="history-table"><tr><th>账号</th><th>时长</th><th>出租</th><th>归还</th></tr>'+history.slice(0,50).map(r=>'<tr><td style="color:#e5e5e5">'+esc(r.name)+'</td><td>'+(r.rv||'')+(r.ru||'')+'</td><td>'+r.rs+'</td><td>'+r.re+'</td></tr>').join('')+'</table>';
  h+='<div class="btn-row"><button class="btn btn-dark" onclick="if(confirm(\'清空记录？\')){history=[];saveHist();this.closest(\'.modal-overlay\').remove()}">清空</button><button class="btn btn-blue" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h)
}
function doExport(){let d=JSON.stringify({accounts,nextId,history:history.slice(0,200)});try{navigator.clipboard.writeText(d);alert('数据已复制！'+accounts.length+'个号')}catch(e){prompt('复制数据：',d)}}
function doImport(){let j=prompt('粘贴数据：');if(!j)return;try{let d=JSON.parse(j);if(d.accounts){accounts=d.accounts;nextId=d.nextId||1};if(d.history)history=d.history;save();saveHist();render();alert('导入成功！'+accounts.length+'个号')}catch(e){alert('格式错误')}}
