<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>今心网络 · 管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e5e5e5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:rgba(13,13,13,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);padding:10px 14px;border-bottom:1px solid #ffffff12;display:flex;align-items:center;gap:8px}
.logo{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:8px;letter-spacing:1px;box-shadow:0 0 12px #6366f133;flex-shrink:0}
.title{font-size:16px;font-weight:700;color:#fff}
.container{max-width:720px;margin:0 auto;padding:8px 12px 80px}
input,textarea,select{background:#111!important;color:#e5e5e5!important;border:1px solid #ffffff15!important;border-radius:12px!important;padding:10px 12px!important;font-size:13px!important;outline:none!important;font-family:inherit;width:100%}
input:focus,textarea:focus,select:focus{border-color:#6366f1!important}
.stats{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{padding:10px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.06);color:#8e8e93;text-align:center;flex:1;min-width:60px;transition:all .2s;border:1px solid #ffffff12}
.stat b{display:block;font-size:22px;margin-top:2px;color:#e5e5e5}
.stat.active{background:#6366f1;color:#fff;box-shadow:0 4px 14px #6366f133;border-color:transparent}
.stat.active b{color:#fff}
.toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:120px}
.btn{border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-blue{background:#6366f1;color:#fff}.btn-purple{background:#a855f7;color:#fff}.btn-teal{background:#14b8a6;color:#fff}.btn-dark{background:#1a1a1a;color:#e5e5e5;border:1px solid #ffffff12}.btn-red{background:#ef4444;color:#fff}.btn-green{background:#22c55e;color:#fff}
.card{background:rgba(255,255,255,0.05);border:1px solid #ffffff12;border-radius:20px;overflow:hidden;margin-bottom:10px;box-shadow:0 4px 20px #00000044}
.card .img-box{height:140px;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card .img-box img{width:100%;height:100%;object-fit:contain}
.card .img-box .game-tag{position:absolute;top:8px;left:8px;background:#00000066;backdrop-filter:blur(10px);color:#fff;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;z-index:2}
.card .body{padding:12px 14px 14px}
.card .row1{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.card .name{font-size:15px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .status{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.st-idle{background:#22c55e}.st-rented{background:#f59e0b}.st-expired{background:#ef4444}.st-disabled{background:#6b7280}
.card .prices{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.card .price-tag{background:#1a1a1a;border:1px solid #6366f133;border-radius:10px;padding:4px 10px;font-size:11px;color:#6366f1}
.card .price-tag .num{font-weight:700;font-size:13px}
.card .countdown{font-size:12px;color:#f59e0b;font-weight:700;padding:6px 10px;background:#221a00;border-radius:10px;margin-bottom:6px}
.card .highlight{font-size:10px;color:#f59e0b;line-height:1.4;margin-bottom:8px}
.card .actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.card .actions .btn{padding:6px 12px;flex:1;min-width:48px;text-align:center;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end}
.modal{background:#1a1a1a;border-radius:24px 24px 0 0;width:100%;max-width:460px;margin:0 auto;max-height:90vh;overflow-y:auto;padding:20px 18px 30px;border-top:1px solid #ffffff12}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px;color:#fff}
.modal label{display:block;font-size:12px;color:#9ca3af;margin-bottom:3px;margin-top:10px}
.modal textarea{height:56px;resize:vertical}
.modal select{appearance:none}
.price-tier{padding:8px 10px;background:#222;border-radius:10px;margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.price-tier input{width:70px!important;flex:none!important;padding:6px 8px!important}
.price-tier select{width:80px!important;flex:none!important;padding:6px 8px!important}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row .btn{flex:1;padding:12px;font-size:14px;border-radius:16px}
.history-table{width:100%;font-size:11px;border-collapse:collapse}
.history-table th{color:#9ca3af;text-align:left;padding:6px 8px;border-bottom:1px solid #ffffff12}
.history-table td{padding:8px;border-bottom:1px solid #ffffff08;color:#e5e5e5}
.empty-state{text-align:center;padding:60px 20px;color:#6b7280}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.9);backdrop-filter:blur(30px);border-top:1px solid #ffffff12;padding:8px 12px;display:flex;gap:6px;z-index:40}
.bottom-bar .btn{flex:1;padding:10px;font-size:11px}
.sync-status{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;display:inline-flex;align-items:center;gap:4px}
.sync-ok{background:#22c55e33;color:#22c55e}.sync-fail{background:#ef444433;color:#ef4444}.sync-off{background:#6b728033;color:#6b7280}
</style>
</head>
<body>
<div class="topbar"><span class="logo">今心网络</span><span class="title">管理</span><span id="syncBadge" class="sync-status sync-off">⚪离线</span></div>
<div class="container" id="app"></div>
<div class="bottom-bar">
  <button class="btn btn-blue" onclick="showAdd()">＋新增</button>
  <button class="btn btn-green" onclick="showGitSettings()">同步</button>
  <button class="btn btn-dark" onclick="showHistory()">记录</button>
  <button class="btn btn-dark" onclick="doExport()">导出</button>
</div>
<script>
const GAME_IMG={LOL:'LOL.png',CF:'CF.png',DNF:'DNF.png',永劫无间:'yjwj.png',和平精英:'heji.png',吃鸡:'heji.png',王者荣耀:'wzry.png',原神:'ys.png',魔兽世界:'mssj.png',逆战:'nz.png',梦幻西游:'mhxy.png',传奇:'cq.png'};
const STY={空闲:'st-idle',已出租:'st-rented',已到期:'st-expired',停用:'st-disabled'};
const GAMES=['','LOL','CF','DNF','永劫无间','和平精英','王者荣耀','原神','魔兽世界','逆战','梦幻西游','传奇'];
const LEVELS={'王者荣耀':['青铜','白银','黄金','铂金','钻石','星耀','王者','荣耀王者'],'LOL':['黑铁','青铜','白银','黄金','铂金','钻石','超凡','王者'],'和平精英':Array.from({length:100},(_,i)=>i+1+'级'),'CF':['新锐','精英','专家','大师','枪王','枪王之王'],'DNF':Array.from({length:100},(_,i)=>i+1+'级'),'永劫无间':['青铜','白银','黄金','铂金','陨星','蚀月','修罗'],'原神':Array.from({length:60},(_,i)=>i+1+'级'),'魔兽世界':Array.from({length:80},(_,i)=>i+1+'级'),'逆战':['青铜','白银','黄金','钻石','王者'],'梦幻西游':Array.from({length:175},(_,i)=>i+1+'级'),'传奇':Array.from({length:100},(_,i)=>i+1+'级')};
let accounts=[],filter='全部',search='',nextId=1,history=[];
const GIT_USER='56gfy',GIT_REPO='jxwl',GIT_BRANCH='main',GIT_FILE='data.json';
let gitToken='';
function loadGitToken(){gitToken=localStorage.getItem('jx_git_token')||''}
function saveGitToken(t){gitToken=t;localStorage.setItem('jx_git_token',t)}
loadGitToken();

function updateSyncBadge(ok){
  let b=document.getElementById('syncBadge');
  if(!gitToken){b.className='sync-status sync-off';b.textContent='⚪离线'}
  else b.className='sync-status '+(ok?'sync-ok':'sync-fail');b.textContent=ok?'🟢已同步':'🔴失败'
}
async function getGitSha(){try{let r=await fetch(`https://api.github.com/repos/${GIT_USER}/${GIT_REPO}/contents/${GIT_FILE}`,{headers:{Authorization:'token '+gitToken}});if(!r.ok)return null;return (await r.json()).sha}catch(e){return null}}
async function readFromGit(){try{let r=await fetch(`https://raw.githubusercontent.com/${GIT_USER}/${GIT_REPO}/${GIT_BRANCH}/${GIT_FILE}`);if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function writeToGit(data,sha){try{
  let body={message:'sync',content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),branch:GIT_BRANCH};
  if(sha)body.sha=sha;
  let r=await fetch(`https://api.github.com/repos/${GIT_USER}/${GIT_REPO}/contents/${GIT_FILE}`,{method:'PUT',headers:{Authorization:'token '+gitToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  let ok=r.ok||r.status===201;updateSyncBadge(ok);return ok
}catch(e){updateSyncBadge(false);return false}}
async function syncToGit(){if(!gitToken)return;let sha=await getGitSha();updateSyncBadge(false);await writeToGit({accounts,nextId,history:history.slice(0,200)},sha)}
async function syncFromGit(){if(!gitToken)return;updateSyncBadge(false);let d=await readFromGit();if(d&&d.accounts){accounts=d.accounts;nextId=d.nextId||1;if(d.history)history=d.history;updateSyncBadge(true);render();return true}updateSyncBadge(false);return false}

// Upload image to GitHub
async function uploadImage(file){
  if(!gitToken){alert('请先配置 GitHub Token');return null}
  let ext=file.name.split('.').pop();let name='img_'+Date.now()+'.'+ext;
  let reader=new FileReader();
  return new Promise((resolve,reject)=>{
    reader.onload=async function(e){
      let base64=e.target.result.split(',')[1];
      try{
        let r=await fetch(`https://api.github.com/repos/${GIT_USER}/${GIT_REPO}/contents/images/${name}`,{method:'PUT',headers:{Authorization:'token '+gitToken,'Content-Type':'application/json'},body:JSON.stringify({message:'upload image',content:base64,branch:GIT_BRANCH})});
        if(r.ok||r.status===201){
          resolve(`https://raw.githubusercontent.com/${GIT_USER}/${GIT_REPO}/${GIT_BRANCH}/images/${name}`);
        }else{let d=await r.json();alert('上传失败: '+(d.message||'未知错误'));resolve(null)}
      }catch(e){alert('上传失败: '+e.message);resolve(null)}
    };reader.readAsDataURL(file)
  });
}

function save(){localStorage.setItem('jx_acc',JSON.stringify(accounts));localStorage.setItem('jx_nid',nextId);localStorage.setItem('jx_hist',JSON.stringify(history.slice(0,200)))}
function load(){try{let a=localStorage.getItem('jx_acc');if(a){accounts=JSON.parse(a);accounts.forEach(x=>{if(x.id>=nextId)nextId=x.id+1})}}catch(e){}nextId=parseInt(localStorage.getItem('jx_nid')||'1');try{let h=localStorage.getItem('jx_hist');if(h)history=JSON.parse(h)}catch(e){}}
function nowISO(){return new Date().toISOString().slice(0,16)}
function rs(a){if(a.status==='停用')return'停用';if(a.status==='空闲')return'空闲';if(a.re&&new Date(a.re)<=new Date())return'已到期';return a.status}
function rem(a){let s=rs(a);if(s!=='已出租'||!a.re)return'';let d=new Date(a.re)-new Date();if(d<=0)return'已到期';let dd=Math.floor(d/86400000),hh=Math.floor(d%86400000/3600000);return '⏱'+(dd>0?dd+'天':'')+(hh>0?hh+'小时':'')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderStats(){let t=0,il=0,rt=0,ex=0;accounts.forEach(a=>{t++;let s=rs(a);if(s==='空闲')il++;if(s==='已出租')rt++;if(s==='已到期')ex++});return '<div class="stats">'+['全部','空闲','已出租','已到期'].map(s=>'<div class="stat'+(filter===s?' active':'')+'" onclick="filter=\''+s+'\';render()">'+s+'<b>'+{全部:t,空闲:il,已出租:rt,已到期:ex}[s]+'</b></div>').join('')+'</div>'}
function formatPrices(prices){
  if(!prices||!prices.length)return'';
  return prices.map(p=>`<span class="price-tag">¥<span class="num">${p.price}</span>/${p.dur}${p.unit}</span>`).join('');
}
function card(a){
  let s=rs(a),g=a.game||'',im=GAME_IMG[g],ac=[];
  let ib='<div class="img-box">';
  if(a.equip)ib+=`<img src="${esc(a.equip)}" onerror="this.style.display='none'">`;
  else if(im)ib+=`<img src="${im}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:36px">🎮</span>`;
  else ib+='<span style="font-size:36px">🎮</span>';
  ib+='<div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,0.6) 0%,transparent 40%)"></div>'+(g?`<span class="game-tag">${esc(g)}</span>`:'')+'</div>';
  let pricesHtml=formatPrices(a.prices);
  if(s==='空闲')ac.push(`<button class="btn btn-teal" style="padding:6px 12px;font-size:11px" onclick="doRent(${a.id})">出租</button>`);
  if(s==='已出租'||s==='已到期')ac.push(`<button class="btn btn-dark" style="padding:6px 12px;font-size:11px" onclick="doIdle(${a.id})">归还</button>`);
  ac.push(`<button class="btn btn-dark" style="padding:6px 12px;font-size:11px" onclick="editAc(${a.id})">编辑</button>`);
  if(s==='停用')ac.push(`<button class="btn btn-blue" style="padding:6px 12px;font-size:11px" onclick="doOn(${a.id})">启用</button>`);
  else ac.push(`<button class="btn btn-dark" style="padding:6px 12px;font-size:11px" onclick="doOff(${a.id})">停用</button>`);
  ac.push(`<button class="btn btn-red" style="padding:6px 12px;font-size:11px" onclick="doDel(${a.id})">删</button>`);
  return `<div class="card">${ib}<div class="body"><div class="row1"><span class="name">${esc(a.name)}</span><span class="status ${STY[s]}">${s}</span></div><div style="font-size:11px;color:#9ca3af;margin-bottom:4px"><span>${esc(a.code)}</span><span> · </span><span>${esc(a.region)}${a.level?'<span style="color:#f59e0b"> · '+esc(a.level)+'</span>':''}</span></div>${pricesHtml?'<div class="prices">'+pricesHtml+'</div>':''}${s==='已出租'?'<div class="countdown">'+rem(a)+'</div>':''}<div class="highlight">${esc(a.highlight||'暂无亮点')}</div><div class="actions">${ac.join('')}</div></div></div>`;
}
function render(){
  let l=accounts;if(filter!=='全部')l=l.filter(a=>rs(a)===filter);
  if(search)l=l.filter(a=>(a.name+a.code+a.region).toLowerCase().includes(search.toLowerCase()));
  document.getElementById('app').innerHTML=renderStats()+`<div class="toolbar"><input placeholder="搜索" value="${esc(search)}" oninput="search=this.value;render()"></div>`+(l.length?l.map(card).join(''):'<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📭</div><p>暂无账号</p></div>');
}
async function doDel(id){if(!confirm('确定删除？'))return;accounts=accounts.filter(a=>a.id!==id);save();render();await syncToGit()}
async function doOff(id){let a=accounts.find(a=>a.id===id);if(a){a.status='停用';save();render();await syncToGit()}}
async function doOn(id){let a=accounts.find(a=>a.id===id);if(a){a.status='空闲';a.rv=null;a.ru=null;a.rs=null;a.re=null;save();render();await syncToGit()}}
async function doIdle(id){let a=accounts.find(a=>a.id===id);if(a){addHist(a);a.status='空闲';a.rv=null;a.ru=null;a.rs=null;a.re=null;save();render();await syncToGit()}}
async function doRent(id){
  let a=accounts.find(a=>a.id===id);if(!a)return;
  if(a.prices&&a.prices.length>0){
    // Show price selection
    let opts=a.prices.map((p,i)=>`${i+1}. ¥${p.price}/${p.dur}${p.unit}`).join('\n');
    let idx=prompt(`选择价格套餐:\n${opts}\n\n输入数字 1-${a.prices.length} 选择，或直接输入自定义如 "3小时"`);
    if(!idx)return;
    let pi=parseInt(idx);
    if(!isNaN(pi)&&pi>=1&&pi<=a.prices.length){
      let p=a.prices[pi-1];
      a.status='已出租';a.rv=p.dur;a.ru=p.unit;a.rs=nowISO();
      if(p.unit==='小时')a.re=new Date(Date.now()+p.dur*3600000).toISOString().slice(0,16);
      else a.re=new Date(Date.now()+p.dur*86400000).toISOString().slice(0,16);
      save();render();await syncToGit();return
    }
  }
  // Custom input fallback
  let s=prompt('输入时长，如：15小时、2天');if(!s)return;
  let m=s.match(/^(\d+(?:\.\d+)?)\s*(小时|天)$/);if(!m){alert('格式错误');return}
  let d=parseFloat(m[1]),unit=m[2];if(!d||d<1)return;
  a.status='已出租';
  if(unit==='小时'){a.rv=d;a.ru='小时';a.rs=nowISO();a.re=new Date(Date.now()+d*3600000).toISOString().slice(0,16)}
  else{a.rv=d;a.ru='天';a.rs=nowISO();a.re=new Date(Date.now()+d*86400000).toISOString().slice(0,16)}
  save();render();await syncToGit()
}

let _tempPriceCount=0;
function showModal(ac){
  let ed=!!ac; _tempPriceCount=0;
  let h=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>${ed?'编辑':'新增'}账号</h3>`;
  h+=`<label>编号</label><input id="f_code" value="${esc(ac?.code||'')}">`;
  h+=`<label>名称</label><input id="f_name" value="${esc(ac?.name||'')}">`;
  h+=`<label>区服</label><input id="f_region" value="${esc(ac?.region||'')}">`;
  h+=`<label>装备图</label><div style="display:flex;gap:6px"><input id="f_equip" value="${esc(ac?.equip||'')}" placeholder="图片链接或上传"><button class="btn btn-dark" style="padding:8px 12px;flex-shrink:0" onclick="uploadImageBtn()">📷上传</button></div><input type="file" id="f_equipFile" accept="image/*" style="display:none" onchange="handleFileSelect(this)">`;
  h+=`<label>价格套餐 <span style="color:#6366f1;font-size:11px">(可添加多个)</span></label><div id="priceList">`;
  if(ac?.prices)ac.prices.forEach((p,i)=>{h+=priceTierHtml(p,i)});
  h+=`</div><button class="btn btn-dark" style="padding:6px 14px;font-size:11px;margin-bottom:4px" onclick="addPriceTier()">＋添加价格</button>`;
  h+=`<label>备注</label><textarea id="f_hl">${esc(ac?.highlight||'')}</textarea>`;
  h+=`<label>游戏</label><select id="f_game" onchange="updateLv()">${GAMES.map(g=>`<option${ac?.game===g?' selected':''}>${g}</option>`).join('')}</select>`;
  h+=`<label>等级</label><select id="f_level"><option value="">无</option></select>`;
  h+=`<label>状态</label><select id="f_status"><option value="空闲"${ac?.status!=='停用'?' selected':''}>空闲</option><option value="停用"${ac?.status==='停用'?' selected':''}>停用</option></select>`;
  h+=`<div class="btn-row"><button class="btn btn-dark" onclick="this.closest('.modal-overlay').remove()">取消</button><button class="btn btn-blue" onclick="saveAc(${ed?ac.id:'null'})">保存</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h);
  setTimeout(()=>{let g=document.getElementById('f_game');if(g)updateLv(ac?.level||'')},50);
}
function priceTierHtml(p,idx){
  let id=++_tempPriceCount;
  return `<div class="price-tier" id="pt_${id}">
    <span style="color:#9ca3af;font-size:11px">¥</span>
    <input id="pp_${id}" value="${p.price||''}" placeholder="价格" style="width:70px!important">
    <input id="pd_${id}" value="${p.dur||''}" placeholder="数量" style="width:60px!important">
    <select id="pu_${id}"><option value="小时"${p.unit==='小时'?' selected':''}>小时</option><option value="天"${p.unit==='天'?' selected':''}>天</option></select>
    <button class="btn btn-red" style="padding:4px 8px;font-size:10px;margin-left:auto" onclick="document.getElementById('pt_${id}').remove()">✕</button>
  </div>`;
}
function addPriceTier(){document.getElementById('priceList').insertAdjacentHTML('beforeend',priceTierHtml({price:'',dur:'',unit:'小时'}))}
function collectPrices(){
  let ps=document.querySelectorAll('[id^="pt_"]'),result=[];
  ps.forEach(el=>{
    let id=el.id.replace('pt_','');
    let price=parseFloat(document.getElementById('pp_'+id)?.value);
    let dur=parseFloat(document.getElementById('pd_'+id)?.value);
    let unit=document.getElementById('pu_'+id)?.value;
    if(price>0&&dur>0)result.push({price,dur,unit})
  });
  return result.length>0?result:undefined;
}
function updateLv(sv){let sel=document.getElementById('f_level');if(!sel)return;let lv=LEVELS[document.getElementById('f_game').value]||[];sel.innerHTML='<option value="">无</option>'+lv.map(l=>`<option${sv===l?' selected':''}>${l}</option>`).join('')}
function showAdd(){showModal(null)}
function editAc(id){let ac=accounts.find(a=>a.id==id);if(!ac){alert('未找到ID:'+id);return};showModal(ac)}
async function saveAc(id){
  let g=n=>document.getElementById('f_'+n).value.trim();
  let a={code:g('code'),name:g('name'),region:g('region'),equip:g('equip'),prices:collectPrices(),highlight:g('hl'),game:document.getElementById('f_game').value,level:document.getElementById('f_level').value,status:document.getElementById('f_status').value};
  if(!a.code||!a.name||!a.region){alert('编号/名称/区服必填');return}
  if(id){let o=accounts.find(x=>x.id==id);Object.assign(o,a)}else{a.id=accounts.length?Math.max(...accounts.map(x=>x.id))+1:1;a.rv=null;a.ru=null;a.rs=null;a.re=null;accounts.unshift(a)}
  save();render();document.querySelector('.modal-overlay')?.remove();await syncToGit()
}
function showGitSettings(){
  let h=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>GitHub 同步</h3><label>Token</label><input id="f_token" value="${esc(gitToken)}"><label>仓库</label><input value="${GIT_USER}/${GIT_REPO}" readonly style="opacity:0.6">`;
  h+=gitToken?'<div style="color:#22c55e;font-size:13px">✅ 已配置</div><div class="btn-row"><button class="btn btn-teal" onclick="testGit()">测试</button><button class="btn btn-red" onclick="document.getElementById(\'f_token\').value=\'\'">清除</button></div>':'<div style="color:#f59e0b;font-size:13px">⚠️ 未配置</div>';
  h+=`<div class="btn-row"><button class="btn btn-dark" onclick="this.closest('.modal-overlay').remove()">取消</button><button class="btn btn-blue" onclick="saveGit()">保存</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h)
}
async function testGit(){let btn=document.querySelector('.btn-teal');if(btn){btn.textContent='测试中...';btn.disabled=true};await syncToGit();if(btn){btn.textContent='测试';btn.disabled=false;alert('请查看右上角状态')}}
function saveGit(){let t=document.getElementById('f_token').value.trim();saveGitToken(t);document.querySelector('.modal-overlay')?.remove();updateSyncBadge(false);if(t)syncToGit();render()}
async function uploadImageBtn(){document.getElementById('f_equipFile')?.click()}
async function handleFileSelect(input){
  if(!input.files||!input.files[0])return;
  let btn=document.querySelector('[onclick="uploadImageBtn()"]');if(btn){btn.textContent='上传中...';btn.disabled=true}
  let url=await uploadImage(input.files[0]);
  if(url){document.getElementById('f_equip').value=url;alert('图片已上传！')}
  if(btn){btn.textContent='📷上传';btn.disabled=false}
  input.value=''
}
function addHist(a){if(!a.rs)return;history.unshift({code:a.code,name:a.name,rv:a.rv,ru:a.ru,rs:a.rs,re:nowISO()});save()}
function showHistory(){
  let h=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>出租记录</h3>`;
  if(!history.length)h+='<p style="color:#6b7280">暂无</p>';
  else h+=`<table class="history-table"><tr><th>账号</th><th>时长</th><th>出租</th><th>归还</th></tr>${history.slice(0,50).map(r=>`<tr><td>${esc(r.name)}</td><td>${r.rv||''}${r.ru||''}</td><td>${r.rs}</td><td>${r.re}</td></tr>`).join('')}</table>`;
  h+=`<div class="btn-row"><button class="btn btn-dark" onclick="if(confirm('清空？')){history=[];save();this.closest('.modal-overlay').remove()}">清空</button><button class="btn btn-blue" onclick="this.closest('.modal-overlay').remove()">关闭</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',h)
}
function doExport(){let d=JSON.stringify({accounts,nextId,history:history.slice(0,200)});try{navigator.clipboard.writeText(d);alert('已复制！'+accounts.length+'个号')}catch(e){prompt('复制数据：',d)}}

load();render();setInterval(render,1000);
if(gitToken){setTimeout(async()=>{let ok=await syncFromGit();if(!ok)syncToGit()},500);setInterval(syncFromGit,15000)}
</script>
</body>
</html>
